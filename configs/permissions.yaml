# AxiOS permission tiers (version 2).
#
# Entries are keyed by actual runtime tool names ("server__tool") and support
# "*"/"?" wildcards. The optional "tool:pattern" form additionally matches the
# call's primary path-like argument (keys: path, file, target); a leading "~"
# is expanded to the user's home directory. Evaluation order:
# prohibited -> trusted -> approval_required -> default_tier.
version: 2
default_tier: approval_required
prohibited:
  - "axios-fs__write_file:/etc/axios/*"     # tool:path-pattern form, optional
  - "axios-fs__read_file:~/.axios/providers.json"
  - "axios-fs__read_file:~/.axios/master.key"
trusted:
  - "axios-fs__read_file"
  - "axios-fs__list_directory"
  - "axios-fs__search_files"
  - "axios-fs__file_info"
  - "axios-system__system_info"
  - "axios-system__disk_usage"
  - "axios-system__process_list"
  - "axios-system__service_status"
  - "axios-docker__list_containers"
  - "axios-docker__container_info"
  - "axios-docker__container_logs"
  - "axios-docker__list_images"
  - "axios-docker__docker_stats"
  - "axios-ollama__list_models"
  - "axios-ollama__model_info"
  - "axios-ollama__ollama_status"
  - "axios-network__list_interfaces"
  - "axios-network__dns_lookup"
  - "axios-network__ping_host"
  - "axios-network__tailscale_status"
approval_required:
  - "axios-fs__write_file"
  - "axios-fs__delete_file"
  - "axios-system__run_command"
  - "axios-system__reboot"
  - "axios-docker__start_container"
  - "axios-docker__stop_container"
  - "axios-docker__restart_container"
  - "axios-docker__remove_container"
  - "axios-docker__pull_image"
  - "axios-docker__run_container"
  - "axios-docker__compose_up"
  - "axios-docker__compose_down"
  - "axios-ollama__pull_model"
  - "axios-ollama__delete_model"
  - "axios-network__tailscale_up"
  - "axios-network__tailscale_down"
  - "opencode__*"
