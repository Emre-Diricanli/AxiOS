server:
  host: "0.0.0.0"
  port: 3000

anthropic:
  # Option 1: Standard API key from console.anthropic.com (pay per token)
  # Can also be set via ANTHROPIC_API_KEY env var
  api_key: ""

  # Option 2: OAuth token from your Claude subscription (free with Pro/Max)
  # Run `claude setup-token` in your terminal, paste the token here
  # Can also be set via ANTHROPIC_OAUTH_TOKEN env var
  oauth_token: ""

  model: "claude-sonnet-4-6"

ollama:
  enabled: true
  host: "localhost"
  port: 11434
  model: "llama3.1:8b"

routing:
  # auto: use cloud when available, fallback to local
  # cloud_only: only use Anthropic API
  # local_only: only use Ollama (no data leaves the machine)
  # cost_aware: track API spend, shift to local when budget depletes
  mode: "auto"

mcp:
  socket_dir: "/tmp/axios-mcp"
  servers:
    - axios-fs
    - axios-system
  # Future servers:
  #   - axios-docker
  #   - axios-gpu
  #   - axios-media
  #   - axios-network
  #   - axios-git
  #   - axios-ollama
