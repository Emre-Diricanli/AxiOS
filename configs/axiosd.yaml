server:
  # Bind address. Loopback-only by default — exposing axiosd on the LAN
  # requires explicit opt-in (e.g. "0.0.0.0:3000").
  listen: "127.0.0.1:3000"

  # Admin authentication (Jupyter-style). On first start axiosd generates an
  # "axsk_..." admin token, prints it ONCE to the daemon log, and stores only
  # its hash in $AXIOS_DATA_DIR/auth.json. Sign in through the web UI (POST
  # /api/auth/login → session cookie) or send the token directly as
  # `Authorization: Bearer axsk_...` (works for /v1 and curl). Lost token?
  # `axiosd --reset-auth` prints a fresh one and invalidates all sessions.
  # For TLS or off-machine access, keep listen on 127.0.0.1 and front axiosd
  # with `tailscale serve` or a reverse proxy. Contract: docs/auth-api.md.
  auth:
    # Auth is ON by default; omitting this section keeps it enabled.
    enabled: true
    # Login session lifetime in hours (default 168 = 7 days).
    session_ttl_hours: 168
    # Extra browser origins allowed for state-changing requests and
    # websockets. Same-host and loopback origins are always allowed, so this
    # is only needed behind a reverse proxy that changes the Host header, e.g.
    #   - "https://axios.tail1234.ts.net"
    allowed_origins: []

model:
  # auto: resolve at boot — explicit provider here, then the first provider
  # whose API-key env var is set, then the saved active provider, then a
  # reachable local Ollama, otherwise start unconfigured (setup wizard).
  # Or name a provider explicitly: anthropic | openai | openrouter | groq |
  # deepseek | xai | mistral | together | fireworks | google | ollama | custom
  provider: auto
  # Model ID. Empty = the provider's default model.
  id: ""

# Ordered chain tried when the active provider fails with a fallback-worthy
# error (auth, billing, rate limit, outage, ...).
# fallback_providers:
#   - provider: openrouter
#     model: anthropic/claude-sonnet-4
#   - provider: ollama
#     model: llama3.1:8b
fallback_providers: []

opencode:
  # Managed background coding agent (opencode serve), supervised by axiosd.
  enabled: true
  binary: opencode
  port: 4097
  workspace: ~/axios-workspace
  # Default model for delegated coding tasks ("provider/model"). Set to
  # "xai/grok-build-0.1" to run tasks on a SuperGrok subscription after
  # connecting via Settings -> Providers -> xAI -> Connect SuperGrok.
  # Empty = opencode's own default.
  model: ""

ollama:
  enabled: true
  host: "localhost"
  port: 11434
  model: "llama3.1:8b"

permissions:
  # Tiered-trust policy enforced on every model-initiated tool call.
  # Falls back to the repo's configs/permissions.yaml (dev checkouts) and
  # then to the built-in default policy when this file is missing.
  path: /etc/axios/permissions.yaml
  # How long an approval_required tool call waits for the user's
  # approval_response before being denied.
  approval_timeout_seconds: 120

routing:
  # auto: use cloud when available, fallback to local
  # cloud_only: only use the active cloud provider
  # local_only: only use Ollama (no data leaves the machine)
  # cost_aware: track API spend, shift to local when budget depletes
  mode: "auto"

mcp:
  socket_dir: "/tmp/axios-mcp"
  servers:
    - axios-fs
    - axios-system
    - axios-docker
    - axios-ollama
    - axios-network
    - axios-git
  # Future servers:
  #   - axios-gpu
  #   - axios-media

gateway:
  # CasaOS-Gateway integration (for running inside CasaOS)
  # When enabled, axiosd registers its API routes with the gateway
  # so they're accessible through the central reverse proxy.
  enabled: false
  # url: "http://localhost:80"  # Auto-discovered if empty
