<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="AxiOS">
  <defs>
    <linearGradient id="orb" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#b7c3ff"/>
      <stop offset="50%" stop-color="#7890f8"/>
      <stop offset="100%" stop-color="#5a6fd0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbital A monogram -->
  <g transform="translate(36,34)" filter="url(#soft)">
    <path
      d="M48 8 L14 116 H34 L41 96 H71 L78 116 H98 L64 8 Z M46 76 L56 46 L66 76 Z"
      fill="url(#orb)"
      fill-rule="evenodd"
    />
    <!-- Orbit ring (ellipse from lower-left to upper-right) -->
    <path
      d="M8 92 C 4 52, 28 6, 72 14 C 104 20, 116 56, 104 88"
      fill="none"
      stroke="url(#orb)"
      stroke-width="5"
      stroke-linecap="round"
    />
    <circle cx="92" cy="22" r="6" fill="#dce3ff"/>
    <circle cx="92" cy="22" r="3" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <g
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, Helvetica, Arial, sans-serif"
    font-size="86"
    font-weight="650"
    letter-spacing="-2"
  >
    <text x="190" y="124" fill="#e7e9ee">Axi</text>
    <text x="340" y="124" fill="#b8c2f5">OS</text>
  </g>
</svg>
