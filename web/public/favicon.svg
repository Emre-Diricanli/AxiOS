<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="AxiOS">
  <defs>
    <linearGradient id="tile" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%" stop-color="#1c2233"/>
      <stop offset="55%" stop-color="#12151c"/>
      <stop offset="100%" stop-color="#0b0d10"/>
    </linearGradient>
    <linearGradient id="a-stroke" x1="30%" y1="5%" x2="70%" y2="95%">
      <stop offset="0%" stop-color="#d4dbff"/>
      <stop offset="40%" stop-color="#9aa8f8"/>
      <stop offset="100%" stop-color="#6d7fe8"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#eef1ff"/>
      <stop offset="70%" stop-color="#a8b6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7890f8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#tile)"/>
  <rect x="5" y="5" width="118" height="118" rx="27" fill="none" stroke="#7890f8" stroke-opacity="0.22" stroke-width="1.25"/>

  <g transform="translate(64 64)" filter="url(#glow)">
    <!-- Outer ticks -->
    <g stroke="#9aa8f8" stroke-opacity="0.5" stroke-width="1.35" stroke-linecap="round">
      <line x1="0" y1="-44" x2="0" y2="-35"/>
      <line x1="0" y1="35" x2="0" y2="44"/>
      <line x1="-44" y1="0" x2="-35" y2="0"/>
      <line x1="35" y1="0" x2="44" y2="0"/>
      <line x1="-31.1" y1="-31.1" x2="-24.7" y2="-24.7"/>
      <line x1="24.7" y1="-24.7" x2="31.1" y2="-31.1"/>
      <line x1="-31.1" y1="31.1" x2="-24.7" y2="24.7"/>
      <line x1="24.7" y1="24.7" x2="31.1" y2="31.1"/>
    </g>
    <circle r="31" fill="none" stroke="#9aa8f8" stroke-opacity="0.42" stroke-width="1.4"/>
    <g stroke="#9aa8f8" stroke-opacity="0.28" stroke-width="1">
      <line x1="0" y1="-31" x2="0" y2="31"/>
      <line x1="-31" y1="0" x2="31" y2="0"/>
    </g>
    <!-- Open outlined A (matches preferred icon) -->
    <path
      d="M0 -27 L-23 29 M0 -27 L23 29 M-8.5 9.5 H8.5"
      fill="none"
      stroke="url(#a-stroke)"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle r="8.5" fill="url(#core)"/>
    <circle r="2" fill="#ffffff"/>
  </g>
</svg>
